<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="container">
    <h1>Login Page</h1>
    <!-- cratea  a from where user put password and username -->

    <form id="loginForm">
        <input type="text" id="username" placeholder="Username" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit">Login</button>
        <!-- add a link for regsiter page -->
        <p>Don't have an account? <a href="register.html">Register here</a></p>
    </form>
    </div>
</body>
<!-- // take the value form my from adn store them in variables -->
<script>
    const loginFrom = document.getElementById("loginForm");
    loginFrom.addEventListener("submit", (e) => {
        e.preventDefault();
        const username = document.getElementById("username").value;
        const password = document.getElementById("password").value;
        // check if the username and password are not empty
        if (username && password) {
            fetch('https://api.freeapi.app/api/v1/users/login', {
                method: 'POST',
                headers: {
                    'accept': 'application/json',
                    'content-type': 'application/json'
                },
                body: JSON.stringify({
                    username: username,
                    password: password
                })
            })
                .then(response => response.json())
                .then(data => {
                    console.log(data);
                    localStorage.setItem("accessToken", data.data.accessToken);
                    window.location.href = "home.html";
                })
                .catch(error => {
                    console.error(error);
                });
        }
    })
</script>

</html>
